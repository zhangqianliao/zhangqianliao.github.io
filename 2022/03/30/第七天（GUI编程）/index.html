      <p><em><strong>给自己一句话：“每天都要打起精神来，今天不学就没机会了”</strong></em></p>
<p><strong>创建窗口Fram</strong>（fram属于<strong>AWT.jar包下的</strong>）</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">Frame frame = new Frame(&quot;我的第一个gui窗口&quot;);</span><br><span class="line">//设置可见性</span><br><span class="line">frame.setVisible(true);</span><br><span class="line">//窗口的大小</span><br><span class="line">frame.setSize(400,400);</span><br><span class="line">//窗口的背景颜色</span><br><span class="line">frame.setBackground(Color.cyan);</span><br><span class="line">//窗口初始位置</span><br><span class="line">frame.setLocation(400,400);</span><br></pre></td></tr></table></figure>

<span id="more"></span>

<p>创建面板Panel和使用监听器关闭窗口（使用适配器模式）**</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br></pre></td><td class="code"><pre><span class="line">public class demo02 &#123;</span><br><span class="line">    public static void main(String[] args) &#123;</span><br><span class="line">        //创建一个窗口</span><br><span class="line">        Frame frame = new Frame();</span><br><span class="line">        //设置布局</span><br><span class="line">        frame.setLayout(null);</span><br><span class="line"></span><br><span class="line">        //创建一个面板</span><br><span class="line">        Panel panel =new Panel();</span><br><span class="line"></span><br><span class="line">        //设置窗口初始位置和大小还有背景颜色</span><br><span class="line">        frame.setBounds(300,300,500,500);</span><br><span class="line">        frame.setBackground(new Color(19, 88, 19));</span><br><span class="line"></span><br><span class="line">        //设置面板初始位置和大小还有背景颜色</span><br><span class="line">        panel.setBounds(50,50,200,200);</span><br><span class="line">        panel.setBackground(new Color(105, 16, 16));</span><br><span class="line"></span><br><span class="line">        //窗口中添加面板</span><br><span class="line">        frame.add(panel);</span><br><span class="line"></span><br><span class="line">        //显示窗口</span><br><span class="line">        frame.setVisible(true);</span><br><span class="line"></span><br><span class="line">        //窗口监听器</span><br><span class="line">        //适配器模式</span><br><span class="line">        frame.addWindowListener(new WindowAdapter() &#123;</span><br><span class="line">            //关闭接口</span><br><span class="line">            @Override</span><br><span class="line">            public void windowClosing(WindowEvent e) &#123;</span><br><span class="line">                System.exit(0);</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p><strong>Frame中Layout三种布局方式</strong></p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br></pre></td><td class="code"><pre><span class="line">public class demo03 &#123;</span><br><span class="line">    public static void main(String[] args) &#123;</span><br><span class="line">        Frame frame = new Frame();</span><br><span class="line"></span><br><span class="line">        Button button1 =new Button();</span><br><span class="line">        Button button2 =new Button();</span><br><span class="line">        Button button3 =new Button();</span><br><span class="line">        Button button4 =new Button();</span><br><span class="line">        Button button5 =new Button();</span><br><span class="line"></span><br><span class="line">        /*</span><br><span class="line">        //流式布局</span><br><span class="line">        frame.setLayout(new FlowLayout(FlowLayout.CENTER));</span><br><span class="line">        //frame.setLayout(new FlowLayout(FlowLayout.LEFT));</span><br><span class="line">        //frame.setLayout(new FlowLayout(FlowLayout.RIGHT));</span><br><span class="line"></span><br><span class="line">        //设置窗口初始位置和大小并添加按钮</span><br><span class="line">        frame.setBounds(200,200,200,500);</span><br><span class="line">        //设置窗口可视化</span><br><span class="line">        frame.setVisible(true);</span><br><span class="line">        frame.add(button1);</span><br><span class="line">        frame.add(button2);</span><br><span class="line">        frame.add(button3);</span><br><span class="line">         */</span><br><span class="line"></span><br><span class="line">        /*</span><br><span class="line">        //东西南北中布局</span><br><span class="line">        frame.add(button1,BorderLayout.EAST);</span><br><span class="line">        frame.add(button2,BorderLayout.CENTER);</span><br><span class="line">        frame.add(button3,BorderLayout.NORTH);</span><br><span class="line">        frame.add(button4,BorderLayout.SOUTH);</span><br><span class="line">        frame.add(button5,BorderLayout.WEST);</span><br><span class="line"></span><br><span class="line">        //设置窗口初始位置和大小并添加按钮</span><br><span class="line">        frame.setBounds(200,200,200,500);</span><br><span class="line">        //设置窗口可视化</span><br><span class="line">        frame.setVisible(true);</span><br><span class="line">         */</span><br><span class="line"></span><br><span class="line">        //表格布局</span><br><span class="line">        frame.setLayout(new GridLayout(2,3));</span><br><span class="line">        frame.pack(); //java函数 （自动选择一个最优秀的位置）</span><br><span class="line">        //向窗口添加按钮</span><br><span class="line">        frame.add(button1);</span><br><span class="line">        frame.add(button2);</span><br><span class="line">        frame.add(button3);</span><br><span class="line">        frame.add(button4);</span><br><span class="line">        frame.add(button5);</span><br><span class="line"></span><br><span class="line">        //设置窗口初始位置和大小并添加按钮</span><br><span class="line">        frame.setBounds(200,200,200,500);</span><br><span class="line">        //设置窗口可视化</span><br><span class="line">        frame.setVisible(true);</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        //窗口监听事件</span><br><span class="line">        frame.addWindowListener(new WindowAdapter() &#123;</span><br><span class="line">            @Override</span><br><span class="line">            public void windowClosing(WindowEvent e) &#123;</span><br><span class="line">                System.exit(0);</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;);</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
