      <p><em><strong>给自己一句话：”今天不学哪来明天“</strong></em></p>
<p><strong>Swing弹窗JDialog</strong></p>
<span id="more"></span>

<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br></pre></td><td class="code"><pre><span class="line">//JFrame窗口</span><br><span class="line">class DialogDemo extends JFrame&#123;</span><br><span class="line"></span><br><span class="line">    //构造方法</span><br><span class="line">    public DialogDemo()&#123;</span><br><span class="line">        //窗口的一些基本设置</span><br><span class="line">        this.setVisible(true);</span><br><span class="line">        this.setBounds(100,100,400,444);</span><br><span class="line">        this.setDefaultCloseOperation(WindowConstants.EXIT_ON_CLOSE);</span><br><span class="line"></span><br><span class="line">        //创建一JFrame类</span><br><span class="line">        Container container =  this.getContentPane();</span><br><span class="line">        container.setLayout(null);</span><br><span class="line"></span><br><span class="line">        //按钮</span><br><span class="line">        JButton jButton = new JButton(&quot;弹出&quot;);</span><br><span class="line">        //按钮大小</span><br><span class="line">        jButton.setBounds(20,20,50,50);</span><br><span class="line">        //添加一个按钮</span><br><span class="line">        container.add(jButton);</span><br><span class="line"></span><br><span class="line">        //添加一个按钮事件</span><br><span class="line">        jButton.addActionListener(new AbstractAction() &#123;</span><br><span class="line">            @Override</span><br><span class="line">            public void actionPerformed(ActionEvent e) &#123;</span><br><span class="line">                new JDialogDemo();</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">//弹窗类</span><br><span class="line">class JDialogDemo extends JDialog&#123;</span><br><span class="line"></span><br><span class="line">        //构造方法</span><br><span class="line">        public JDialogDemo()&#123;</span><br><span class="line">            //设置弹窗的基本设置</span><br><span class="line">            this.setVisible(true);</span><br><span class="line">            this.setBounds(100,100,300,300);</span><br><span class="line"></span><br><span class="line">            //创建也给类</span><br><span class="line">            Container container = this.getContentPane();</span><br><span class="line">            container.add(new JLabel(&quot;看一下&quot;));</span><br><span class="line">        &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p><strong>Icon和ImageIcon标签</strong></p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br></pre></td><td class="code"><pre><span class="line">//icon</span><br><span class="line">public class Demo11 &#123;</span><br><span class="line">    public static void main(String[] args) &#123;</span><br><span class="line">        new IcomDemo().init(30,30); //开启</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">class IcomDemo extends JFrame implements Icon&#123;</span><br><span class="line">    int width;</span><br><span class="line">    int height;</span><br><span class="line"></span><br><span class="line">    public IcomDemo()&#123;</span><br><span class="line">    &#125;</span><br><span class="line">    public IcomDemo(int width,int height)&#123;</span><br><span class="line">        this.width = width;</span><br><span class="line">        this.height = height;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    //ICom方法</span><br><span class="line">    public void init(int width,int height)&#123;</span><br><span class="line">        //创建一个标志</span><br><span class="line">        IcomDemo icomDemo = new IcomDemo(width,height);</span><br><span class="line"></span><br><span class="line">        //设置标志的位置</span><br><span class="line">        JLabel jLabel = new JLabel(&quot;hhhh&quot;,icomDemo,SwingConstants.CENTER);</span><br><span class="line">        this.setVisible(true);</span><br><span class="line"></span><br><span class="line">        //获取frame中的方法</span><br><span class="line">        Container container = this.getContentPane();</span><br><span class="line">        container.setBounds(100,100,400,400);</span><br><span class="line">        container.add(jLabel);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    @Override</span><br><span class="line">    public void paintIcon(Component c, Graphics g, int x, int y) &#123;  //画</span><br><span class="line">        g.fillOval(x,y,width,height);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    @Override</span><br><span class="line">    public int getIconWidth() &#123;</span><br><span class="line">        return this.width;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    @Override</span><br><span class="line">    public int getIconHeight() &#123;</span><br><span class="line">        return this.height;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line">//ImageIcon的使用</span><br><span class="line">public class Demo12 &#123;</span><br><span class="line"></span><br><span class="line">    public static void main(String[] args) throws Exception &#123;</span><br><span class="line">        new Demos12(); //开启</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">class Demos12 extends JFrame &#123;</span><br><span class="line">    public  Demos12() throws Exception &#123;</span><br><span class="line">        </span><br><span class="line">        JLabel jLabel =new JLabel(&quot;hhhh&quot;);</span><br><span class="line">        </span><br><span class="line">        URL url = Demos12.class.getResource(&quot;jj.jpg&quot;); //获取当前对象的一个值</span><br><span class="line">        ImageIcon imageIcon = new ImageIcon(url); //创建一个图标</span><br><span class="line">        jLabel.setIcon(imageIcon);  //JLabel添加一个图片</span><br><span class="line">        jLabel.setHorizontalAlignment(SwingConstants.CENTER); //设置位置</span><br><span class="line"></span><br><span class="line">        this.setVisible(true);</span><br><span class="line">        this.setBounds(100,100,400,400);</span><br><span class="line"></span><br><span class="line">        Container container = getContentPane();</span><br><span class="line">        container.add(jLabel);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p><strong>textArea文本域和JScrollPane面板</strong></p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line">public class Demo13 &#123;</span><br><span class="line">    public static void main(String[] args) &#123;</span><br><span class="line">        new JScroll(); //开启</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">class JScroll extends JFrame&#123;</span><br><span class="line">    public JScroll()&#123;</span><br><span class="line"></span><br><span class="line">        this.setVisible(true);</span><br><span class="line">        this.setBounds(100,100,500,500);</span><br><span class="line"></span><br><span class="line">        Container container = this.getContentPane();</span><br><span class="line"></span><br><span class="line">        //创建文本域</span><br><span class="line">        JTextArea jTextArea =new JTextArea(20,10);</span><br><span class="line">        jTextArea.setText(&quot;我太蠢了&quot;);</span><br><span class="line"></span><br><span class="line">        //创建Scroll面板</span><br><span class="line">        JScrollPane pane = new JScrollPane(jTextArea);</span><br><span class="line"></span><br><span class="line">        container.add(pane);</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
